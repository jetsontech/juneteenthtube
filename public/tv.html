<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juneteenth TV — 24/7 Black Cinema FAST Channel</title>
    <meta name="description"
        content="Free 24/7 Black Cinema. Stream classic films from the Golden Age of Black filmmaking — public domain, ad-free, always on.">

    <!-- Video.js Core -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <!-- Video.js Playlist UI (optional styling) -->
    <link href="https://cdn.jsdelivr.net/npm/videojs-playlist-ui@4.1.0/dist/videojs-playlist-ui.css" rel="stylesheet">

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-card: #111111;
            --bg-card-hover: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent: #e53935;
            --accent-glow: rgba(229, 57, 53, 0.3);
            --accent-gold: #f5c518;
            --border: rgba(255, 255, 255, 0.06);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── HEADER BAR ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-brand svg {
            width: 28px;
            height: 28px;
            color: var(--accent);
        }

        .header-title {
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .header-title span {
            color: var(--accent-gold);
        }

        .fast-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(229, 57, 53, 0.15);
            border: 1px solid rgba(229, 57, 53, 0.3);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .fast-badge .dot {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        /* ── PLAYER WRAPPER ── */
        .player-section {
            position: relative;
            width: calc(100% - 32px);
            max-width: 1600px;
            margin: 96px auto 32px auto;
            /* Increased top margin to clear header without inline style */
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: 75vh;
            min-height: 400px;
            background: #000;
        }

        .player-section .video-js {
            width: 100%;
            height: 100%;
        }

        .video-js .vjs-big-play-button {
            display: none !important;
        }

        .video-js .vjs-control-bar {
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
            height: 50px;
            padding: 0 16px;
        }

        .video-js .vjs-play-progress,
        .video-js .vjs-volume-level {
            background: var(--accent) !important;
        }

        .video-js .vjs-slider:focus {
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        /* ── LIVE NOW BADGE ── */
        .live-badge {
            position: absolute;
            top: 72px;
            left: 20px;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.7);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 8px 14px;
            pointer-events: none;
            animation: fade-in 0.6s ease;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-glow);
            animation: pulse-dot 1.5s ease-in-out infinite;
        }

        .live-text {
            font-size: 11px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ── NOW PLAYING OVERLAY ── */
        .now-playing-overlay {
            position: absolute;
            bottom: 60px;
            left: 20px;
            right: 20px;
            z-index: 40;
            pointer-events: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s, transform 0.5s;
        }

        .now-playing-overlay.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .now-playing-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(229, 57, 53, 0.2);
            border: 1px solid rgba(229, 57, 53, 0.3);
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 9px;
            font-weight: 900;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .now-playing-title {
            font-size: 28px;
            font-weight: 900;
            line-height: 1.1;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.8);
            margin-bottom: 6px;
        }

        .now-playing-desc {
            font-size: 13px;
            color: var(--text-secondary);
            max-width: 600px;
            line-height: 1.5;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.8);
        }

        /* ── GUIDE SECTION ── */
        .guide-section {
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .guide-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .guide-title {
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .guide-title svg {
            width: 18px;
            height: 18px;
            color: var(--accent);
        }

        .guide-count {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* ── PLAYLIST ITEMS ── */
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 12px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .playlist-item:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .playlist-item.active {
            border-color: rgba(229, 57, 53, 0.4);
            background: rgba(229, 57, 53, 0.05);
        }

        .playlist-item.active::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--accent);
            border-radius: 0 3px 3px 0;
        }

        .item-number {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .playlist-item.active .item-number {
            background: rgba(229, 57, 53, 0.2);
            color: var(--accent);
        }

        .item-info {
            flex: 1;
            min-width: 0;
        }

        .item-name {
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .item-desc {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        /* ── CHANNEL TUNE-IN SPLASH ── */
        .tune-in-splash {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            transition: opacity 1.2s ease;
        }

        .tune-in-splash.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .tune-in-icon {
            width: 80px;
            height: 80px;
            border-radius: 24px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px var(--accent-glow);
            margin-bottom: 24px;
            animation: scale-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tune-in-icon svg {
            width: 40px;
            height: 40px;
            color: #000;
        }

        .tune-in-ch {
            font-size: 13px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .tune-in-name {
            font-size: 42px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .tune-in-tagline {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .tune-in-fast {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ── FOOTER ── */
        .footer {
            padding: 32px 24px;
            text-align: center;
            border-top: 1px solid var(--border);
            margin-top: 24px;
        }

        .footer p {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer .sources {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .footer .sources span {
            font-size: 9px;
            padding: 3px 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-muted);
        }

        /* ── ANIMATIONS ── */
        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scale-in {
            from {
                transform: scale(0.6);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .player-section {
                height: 56vw;
                min-height: 220px;
                width: calc(100% - 16px);
                margin: 80px auto 16px auto;
                /* 80px top margin to clear the header */
                border-radius: 16px;
            }

            .header {
                padding: 10px 16px;
            }

            .header-title {
                font-size: 14px;
            }

            .guide-section {
                padding: 16px;
            }

            .playlist-grid {
                grid-template-columns: 1fr;
            }

            .now-playing-title {
                font-size: 20px;
            }

            .tune-in-name {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>

    <!-- TUNE-IN SPLASH -->
    <div class="tune-in-splash" id="tuneSplash">
        <div class="tune-in-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="7" width="20" height="15" rx="2" ry="2" />
                <polyline points="17 2 12 7 7 2" />
            </svg>
        </div>
        <div class="tune-in-ch">JUNETEENTH TV</div>
        <div class="tune-in-name">Black Cinema Classics</div>
        <div class="tune-in-tagline">24/7 Free Streaming — Public Domain</div>
        <div class="tune-in-fast">
            <span>⚡</span> FAST Channel • Auto-Playing
        </div>
    </div>

    <!-- HEADER -->
    <header class="header">
        <div class="header-brand">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="7" width="20" height="15" rx="2" ry="2" />
                <polyline points="17 2 12 7 7 2" />
            </svg>
            <div class="header-title"><span>Juneteenth</span> TV</div>
        </div>
        <div class="fast-badge">
            <div class="dot"></div>
            FAST Channel
        </div>
    </header>

    <!-- PLAYER -->
    <div class="player-section">
        <!-- LIVE NOW Badge -->
        <div class="live-badge">
            <div class="live-dot"></div>
            <span class="live-text">Live Now</span>
        </div>

        <!-- Now Playing Overlay -->
        <div class="now-playing-overlay" id="nowPlayingOverlay">
            <div class="now-playing-tag">
                <div class="live-dot" style="width:5px;height:5px;"></div>
                NOW PLAYING
            </div>
            <div class="now-playing-title" id="npTitle"></div>
            <div class="now-playing-desc" id="npDesc"></div>
        </div>

        <video-js id="juneteenthPlayer" class="vjs-default-skin vjs-fluid" controls preload="auto" playsinline>
        </video-js>
    </div>

    <!-- GUIDE -->
    <section class="guide-section">
        <div class="guide-header">
            <div class="guide-title">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6" />
                    <line x1="8" y1="12" x2="21" y2="12" />
                    <line x1="8" y1="18" x2="21" y2="18" />
                    <line x1="3" y1="6" x2="3.01" y2="6" />
                    <line x1="3" y1="12" x2="3.01" y2="12" />
                    <line x1="3" y1="18" x2="3.01" y2="18" />
                </svg>
                Program Guide
            </div>
            <div class="guide-count">6 FILMS • ALL PUBLIC DOMAIN</div>
        </div>
        <div class="playlist-grid" id="playlistGrid"></div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <p>Juneteenth TV — Free Ad-Supported Streaming Television</p>
        <div class="sources">
            <span>Archive.org</span>
            <span>Public Domain</span>
            <span>24/7 Linear</span>
        </div>
    </footer>

    <!-- Video.js Core -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <!-- Video.js Playlist Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/videojs-playlist@5.1.0/dist/videojs-playlist.min.js"></script>
    <!-- Video.js Playlist UI Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/videojs-playlist-ui@4.1.0/dist/videojs-playlist-ui.min.js"></script>

    <script>
        (function () {
            'use strict';

            /* ═══════════════════════════════════════════
               PLAYLIST DATA — 6 Black Cinema Classics
               ═══════════════════════════════════════════ */

            const playlistData = [
                {
                    name: "The Blood of Jesus (1941)",
                    description: "Spencer Williams' masterpiece and the first race film inducted into the National Film Registry. A devout Baptist woman is accidentally shot and sent to a crossroads between Heaven and Hell.",
                    sources: [{ src: "https://archive.org/download/blood_of_jesus/blood_of_jesus.mp4", type: "video/mp4" }],
                    thumbnail: false
                },
                {
                    name: "Juke Joint (1947)",
                    description: "Classic comedy and music featuring Spencer Williams. A vivid snapshot of Black entertainment culture in the post-war era.",
                    sources: [{ src: "https://archive.org/download/juke_joint_1947/juke_joint_1947.mp4", type: "video/mp4" }],
                    thumbnail: false
                },
                {
                    name: "Hi-De-Ho (1947)",
                    description: "Musical extravaganza starring Cab Calloway. Jealousy, gangsters, and legendary scat singing in the golden era of Harlem nightclubs.",
                    sources: [{ src: "https://archive.org/download/hi_de_ho/Hi-De-Ho.mp4", type: "video/mp4" }],
                    thumbnail: false
                },
                {
                    name: "Within Our Gates (1920)",
                    description: "Directed by Oscar Micheaux. The oldest surviving film by an African-American director — a powerful response to D.W. Griffith's 'Birth of a Nation'.",
                    sources: [{ src: "https://archive.org/download/WithinOurGates/WithinOurGates_512kb.mp4", type: "video/mp4" }],
                    thumbnail: false
                },
                {
                    name: "Rock 'n' Roll Revue (1955)",
                    description: "Live from Harlem's Apollo Theater — Duke Ellington, Nat King Cole, Dinah Washington, and more. A vibrant celebration of Black musical talent.",
                    sources: [{ src: "https://archive.org/download/rock-n-roll-revue-1955/Rock%20%27n%27%20Roll%20Revue%20%281955%29.mp4", type: "video/mp4" }],
                    thumbnail: false
                },
                {
                    name: "Dark Manhattan (1937)",
                    description: "Hollywood's first all-Black gangster movie. Ralph Cooper stars as Curly Thorpe in this rare film that broke records at the Apollo Theater.",
                    sources: [{ src: "https://archive.org/download/dark-manhattan-1937/dark-manhattan-1937.mp4", type: "video/mp4" }],
                    thumbnail: false
                }
            ];

            /* ═══════════════════════════════════════════
               INITIALIZE VIDEO.JS + PLAYLIST
               ═══════════════════════════════════════════ */

            const player = videojs('juneteenthPlayer', {
                autoplay: true,
                controls: true,
                fluid: true,
                preload: 'auto',
                playsinline: true,
                html5: {
                    vhs: { overrideNative: true },
                    nativeVideoTracks: false,
                    nativeAudioTracks: false,
                    nativeTextTracks: false
                }
            });

            // Load the playlist
            player.playlist(playlistData);

            // Auto-advance: 0 = start next immediately when current ends
            player.playlist.autoadvance(0);

            // Start the first item
            player.playlist.currentItem(0);

            /* ═══════════════════════════════════════════
               BUILD THE GUIDE UI
               ═══════════════════════════════════════════ */

            const grid = document.getElementById('playlistGrid');
            const npTitle = document.getElementById('npTitle');
            const npDesc = document.getElementById('npDesc');
            const overlay = document.getElementById('nowPlayingOverlay');

            function buildGuide() {
                grid.innerHTML = '';
                const currentIdx = player.playlist.currentIndex();
                playlistData.forEach((item, idx) => {
                    const el = document.createElement('div');
                    el.className = 'playlist-item' + (idx === currentIdx ? ' active' : '');
                    el.innerHTML = `
                    <div class="item-number">${idx === currentIdx ? '▶' : idx + 1}</div>
                    <div class="item-info">
                        <div class="item-name">${item.name}</div>
                        <div class="item-desc">${item.description}</div>
                    </div>
                `;
                    el.addEventListener('click', () => {
                        player.playlist.currentItem(idx);
                        player.play();
                    });
                    grid.appendChild(el);
                });
            }

            function updateNowPlaying() {
                const idx = player.playlist.currentIndex();
                const item = playlistData[idx];
                if (item) {
                    npTitle.textContent = item.name;
                    npDesc.textContent = item.description;
                }
            }

            // Show overlay briefly when a new movie starts
            function flashNowPlaying() {
                updateNowPlaying();
                overlay.classList.add('visible');
                setTimeout(() => overlay.classList.remove('visible'), 6000);
            }

            // Listen for playlist item changes
            player.on('playlistitem', () => {
                buildGuide();
                flashNowPlaying();
            });

            // Initial build
            buildGuide();
            flashNowPlaying();

            /* ═══════════════════════════════════════════
               TUNE-IN SPLASH — fade out after 2.5s
               ═══════════════════════════════════════════ */

            const splash = document.getElementById('tuneSplash');
            setTimeout(() => {
                splash.classList.add('fade-out');
                // Try to force play (some browsers block autoplay)
                player.play().catch(() => {
                    // If autoplay blocked, add click-to-play
                    document.body.addEventListener('click', function handler() {
                        player.play();
                        document.body.removeEventListener('click', handler);
                    }, { once: true });
                });
            }, 2500);
            setTimeout(() => splash.remove(), 4000);

            /* ═══════════════════════════════════════════
               HANDLE PLAYLIST END — loop back to start
               ═══════════════════════════════════════════ */

            player.on('playlistend', () => {
                // Loop the whole playlist like a 24/7 channel
                player.playlist.currentItem(0);
                player.play();
            });

            /* ═══════════════════════════════════════════
               ERROR HANDLING — skip broken sources
               ═══════════════════════════════════════════ */

            player.on('error', () => {
                console.warn('Juneteenth TV: Skipping broken source, advancing to next...');
                const nextIdx = (player.playlist.currentIndex() + 1) % playlistData.length;
                player.playlist.currentItem(nextIdx);
                player.play();
            });

        })();
    </script>
</body>

</html>
